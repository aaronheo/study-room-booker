<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Room Booker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 2rem;
      max-width: 500px;
      width: 100%;
      margin: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
      color: #cc0000;
    }
    .subtitle {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #e0e0e0;
    }
    .tab {
      padding: 0.5rem 1rem;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 0.9rem;
      color: #666;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab.active {
      color: #cc0000;
      border-bottom-color: #cc0000;
      font-weight: 600;
    }
    .tab:hover { color: #cc0000; }

    .auth-section { display: none; }
    .auth-section.active { display: block; }

    label {
      display: block;
      font-weight: 500;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
      color: #333;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #cc0000;
      box-shadow: 0 0 0 3px rgba(204,0,0,0.1);
    }
    textarea { resize: vertical; min-height: 60px; font-family: monospace; }

    .row {
      display: flex;
      gap: 1rem;
    }
    .row > div { flex: 1; }

    .help-text {
      font-size: 0.75rem;
      color: #888;
      margin-top: -0.75rem;
      margin-bottom: 1rem;
    }

    button.primary {
      width: 100%;
      padding: 0.75rem;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.primary:hover { background: #a30000; }
    button.primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #status {
      margin-top: 1rem;
      display: none;
    }
    .status-log {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 0.75rem;
      max-height: 250px;
      overflow-y: auto;
      font-size: 0.8rem;
      font-family: monospace;
      line-height: 1.6;
    }
    .status-log .msg { padding: 0.1rem 0; }
    .status-log .msg.error { color: #cc0000; font-weight: 600; }
    .status-log .msg.success { color: #28a745; font-weight: 600; }
    .status-log .msg.info { color: #0066cc; }

    #availableRooms {
      margin-top: 1rem;
      display: none;
    }
    .room-list {
      list-style: none;
      padding: 0;
    }
    .room-list li {
      padding: 0.5rem 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .room-list li button {
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .room-list li button:hover { background: #a30000; }

    .divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Study Room Booker</h1>
    <p class="subtitle">University of Utah - Marriott Library</p>

    <p class="help-text">Credentials are configured via environment variables. After clicking Book, approve the Duo push on your phone.</p>

    <!-- Booking preferences -->
    <label for="date">Date</label>
    <input type="date" id="date" value="2026-03-29">

    <div class="row">
      <div>
        <label for="startTime">Start Time</label>
        <input type="time" id="startTime" value="11:00">
      </div>
      <div>
        <label for="endTime">End Time</label>
        <input type="time" id="endTime" value="14:00">
      </div>
    </div>

    <label for="room">Preferred Room</label>
    <select id="room">
      <option value="2130A Study Room">2130A Study Room</option>
      <option value="2130B Study Room">2130B Study Room</option>
      <option value="2130C Study Room">2130C Study Room</option>
      <option value="2130D Study Room">2130D Study Room</option>
      <option value="2130E Study Room">2130E Study Room</option>
      <option value="2130F Study Room">2130F Study Room</option>
      <option value="2130G Study Room">2130G Study Room</option>
      <option value="2130H Study Room">2130H Study Room</option>
      <option value="2130J Study Room">2130J Study Room</option>
      <option value="2130K Study Room">2130K Study Room</option>
      <option value="2130L Study Room">2130L Study Room</option>
      <option value="2130M Study Room">2130M Study Room</option>
      <option value="2130P Study Room">2130P Study Room</option>
      <option value="2130Q Study Room">2130Q Study Room</option>
      <option value="2130R Study Room">2130R Study Room</option>
      <option value="2130S Study Room">2130S Study Room</option>
      <option value="2130U Study Room">2130U Study Room</option>
    </select>

    <button class="primary" id="bookBtn">Book Room</button>

    <div id="status">
      <div class="status-log" id="statusLog"></div>
    </div>

    <div id="availableRooms">
      <h3 style="margin-bottom:0.5rem;">Available Rooms</h3>
      <ul class="room-list" id="roomList"></ul>
    </div>
  </div>

  <script>
    const bookBtn = document.getElementById('bookBtn');
    const statusDiv = document.getElementById('status');
    const statusLog = document.getElementById('statusLog');
    const availableRoomsDiv = document.getElementById('availableRooms');
    const roomList = document.getElementById('roomList');

    function addLog(msg, type = '') {
      const div = document.createElement('div');
      div.className = 'msg ' + type;
      div.textContent = msg;
      statusLog.appendChild(div);
      statusLog.scrollTop = statusLog.scrollHeight;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
    }

    async function startBooking(overrideRoom) {
      statusDiv.style.display = 'block';
      availableRoomsDiv.style.display = 'none';
      roomList.innerHTML = '';
      statusLog.innerHTML = '';
      bookBtn.disabled = true;

      const body = {
        date: formatDate(document.getElementById('date').value),
        startTime: document.getElementById('startTime').value,
        endTime: document.getElementById('endTime').value,
        room: overrideRoom || document.getElementById('room').value,
      };

      // Credentials come from server-side env vars

      addLog('Starting booking process...', 'info');

      try {
        const res = await fetch('/api/book', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const { jobId } = await res.json();

        // Listen for SSE status updates
        const evtSource = new EventSource(`/api/status/${jobId}`);
        evtSource.onmessage = (e) => {
          const data = JSON.parse(e.data);

          if (data.status === 'progress') {
            addLog(data.message, 'info');
          } else if (data.status === 'done') {
            evtSource.close();
            bookBtn.disabled = false;

            if (data.success) {
              addLog(data.message, 'success');
            } else {
              addLog(data.message, 'error');
              if (data.availableRooms && data.availableRooms.length > 0) {
                showAvailableRooms(data.availableRooms);
              }
            }
          } else if (data.status === 'error') {
            evtSource.close();
            bookBtn.disabled = false;
            addLog('Error: ' + data.message, 'error');
          }
        };

        evtSource.onerror = () => {
          evtSource.close();
          bookBtn.disabled = false;
        };
      } catch (err) {
        addLog('Request failed: ' + err.message, 'error');
        bookBtn.disabled = false;
      }
    }

    function showAvailableRooms(rooms) {
      availableRoomsDiv.style.display = 'block';
      roomList.innerHTML = '';
      rooms.forEach(name => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span>${name}</span>
          <button onclick="startBooking('${name.replace(/'/g, "\\'")}')">Book This</button>
        `;
        roomList.appendChild(li);
      });
    }

    bookBtn.addEventListener('click', () => startBooking());
  </script>
</body>
</html>
