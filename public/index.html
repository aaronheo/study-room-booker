<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Room Booker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 2rem;
      max-width: 600px;
      width: 100%;
      margin: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
      color: #cc0000;
    }
    .subtitle {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #e0e0e0;
    }
    .tab {
      padding: 0.5rem 1rem;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 0.9rem;
      color: #666;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab.active {
      color: #cc0000;
      border-bottom-color: #cc0000;
      font-weight: 600;
    }
    .tab:hover { color: #cc0000; }

    .auth-section { display: none; }
    .auth-section.active { display: block; }

    label {
      display: block;
      font-weight: 500;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
      color: #333;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #cc0000;
      box-shadow: 0 0 0 3px rgba(204,0,0,0.1);
    }
    textarea { resize: vertical; min-height: 60px; font-family: monospace; }

    .row {
      display: flex;
      gap: 1rem;
    }
    .row > div { flex: 1; }

    .help-text {
      font-size: 0.75rem;
      color: #888;
      margin-top: -0.75rem;
      margin-bottom: 1rem;
    }

    button.primary {
      width: 100%;
      padding: 0.75rem;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.primary:hover { background: #a30000; }
    button.primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #status {
      margin-top: 1rem;
      display: none;
    }
    .status-log {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 1rem;
      max-height: 500px;
      overflow-y: auto;
      font-size: 0.85rem;
      font-family: monospace;
      line-height: 1.8;
    }
    .status-log .msg { padding: 0.1rem 0; }
    .status-log .msg.error { color: #cc0000; font-weight: 600; }
    .status-log .msg.success { color: #28a745; font-weight: 600; }
    .status-log .msg.info { color: #0066cc; }

    #availableRooms {
      margin-top: 1rem;
      display: none;
    }
    .room-list {
      list-style: none;
      padding: 0;
    }
    .room-list li {
      padding: 0.5rem 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .room-list li button {
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .room-list li button:hover:not(:disabled) { background: #a30000; }
    .room-list li button:disabled { background: #ccc; cursor: not-allowed; }

    .page-section { display: none; }
    .page-section.active { display: block; }

    .reservations-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }
    .reservations-table th {
      background: #cc0000;
      color: #fff;
      padding: 0.5rem;
      text-align: left;
      font-weight: 600;
    }
    .reservations-table td {
      padding: 0.5rem;
      border-bottom: 1px solid #e0e0e0;
    }
    .reservations-table tr:hover {
      background: #f8f9fa;
    }
    .no-reservations {
      text-align: center;
      color: #888;
      padding: 2rem 0;
    }

    .divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Study Room Booker</h1>
    <p class="subtitle">University of Utah - Marriott Library</p>

    <!-- Page tabs -->
    <div class="tabs">
      <button class="tab active" data-page="book">Book a Room</button>
      <button class="tab" data-page="reservations">My Reservations</button>
    </div>

    <!-- Book tab -->
    <div class="page-section active" id="book-page">
    <p class="help-text">After clicking Book, approve the Duo push on your phone.</p>

    <!-- Booking preferences -->
    <label for="date">Date</label>
    <input type="date" id="date" value="2026-03-29">

    <div class="row">
      <div>
        <label for="startTime">Start Time</label>
        <input type="time" id="startTime" value="11:00">
      </div>
      <div>
        <label for="endTime">End Time</label>
        <input type="time" id="endTime" value="14:00">
      </div>
    </div>

    <button class="primary" id="checkBtn">Check Availability</button>

    <div id="availableRooms" style="display:none; margin-top:1rem;">
      <h3 style="margin-bottom:0.5rem;">Available Rooms</h3>
      <p class="help-text" style="margin-top:0;">Click a room to book it.</p>
      <ul class="room-list" id="roomList"></ul>
    </div>

    <div id="status" style="display:none; margin-top:1rem;">
      <div class="status-log" id="statusLog"></div>
    </div>
    </div>

    <!-- Reservations tab -->
    <div class="page-section" id="reservations-page">
      <button class="primary" id="loadReservationsBtn">Load My Reservations</button>
      <p class="help-text" style="margin-top:0.5rem;">This will log in and fetch your upcoming reservations. Approve the Duo push on your phone.</p>
      <div id="reservationsStatus" style="display:none;">
        <div class="status-log" id="reservationsLog"></div>
      </div>
      <div id="reservationsList" style="margin-top:1rem;"></div>
    </div>
  </div>

  <script>
    // Page tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.page + '-page').classList.add('active');
      });
    });

    const checkBtn = document.getElementById('checkBtn');
    const statusDiv = document.getElementById('status');
    const statusLog = document.getElementById('statusLog');
    const availableRoomsDiv = document.getElementById('availableRooms');
    const roomList = document.getElementById('roomList');

    function addLog(msg, type = '') {
      const div = document.createElement('div');
      div.className = 'msg ' + type;
      div.textContent = msg;
      statusLog.appendChild(div);
      statusLog.scrollTop = statusLog.scrollHeight;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
    }

    function getBookingParams() {
      return {
        date: formatDate(document.getElementById('date').value),
        startTime: document.getElementById('startTime').value,
        endTime: document.getElementById('endTime').value,
      };
    }

    function validateTimes() {
      const start = document.getElementById('startTime').value;
      const end = document.getElementById('endTime').value;
      if (!start || !end) return 'Please select start and end times.';
      const [sh, sm] = start.split(':').map(Number);
      const [eh, em] = end.split(':').map(Number);
      const diffMins = (eh * 60 + em) - (sh * 60 + sm);
      if (diffMins <= 0) return 'End time must be after start time.';
      if (diffMins > 180) return 'Maximum booking duration is 3 hours.';
      return null;
    }

    // Step 1: Check availability
    async function checkAvailability() {
      const timeError = validateTimes();
      if (timeError) {
        statusDiv.style.display = 'block';
        statusLog.innerHTML = '';
        addLog(timeError, 'error');
        return;
      }
      checkBtn.disabled = true;
      checkBtn.textContent = 'Checking...';
      availableRoomsDiv.style.display = 'none';
      roomList.innerHTML = '';
      statusDiv.style.display = 'block';
      statusLog.innerHTML = '';

      const params = getBookingParams();

      try {
        const res = await fetch('/api/availability', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(params),
        });
        if (!res.ok) {
          const text = await res.text();
          let msg;
          try { msg = JSON.parse(text).error; } catch { msg = text; }
          addLog(`Server error (${res.status}): ${msg}`, 'error');
          checkBtn.disabled = false;
          checkBtn.textContent = 'Check Availability';
          return;
        }
        const data = await res.json();
        if (data.error) {
          addLog('Error: ' + data.error, 'error');
          checkBtn.disabled = false;
          checkBtn.textContent = 'Check Availability';
          return;
        }
        const { jobId } = data;

        addLog('Checking availability...', 'info');

        const evtSource = new EventSource(`/api/status/${jobId}`);
        evtSource.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.status === 'progress') {
            addLog(msg.message, 'info');
          } else if (msg.status === 'done') {
            evtSource.close();
            if (msg.availableRooms && msg.availableRooms.length > 0) {
              addLog(`Found ${msg.availableRooms.length} available room(s).`, 'success');
              showAvailableRooms(msg.availableRooms);
            } else {
              addLog('No rooms available for the selected time slot.', 'error');
            }
            checkBtn.disabled = false;
            checkBtn.textContent = 'Check Availability';
          } else if (msg.status === 'error') {
            evtSource.close();
            addLog('Error: ' + msg.message, 'error');
            checkBtn.disabled = false;
            checkBtn.textContent = 'Check Availability';
          }
        };
        evtSource.onerror = () => {
          evtSource.close();
          addLog('Connection to server lost.', 'error');
          checkBtn.disabled = false;
          checkBtn.textContent = 'Check Availability';
        };
      } catch (err) {
        addLog('Request failed: ' + err.message, 'error');
      }

      checkBtn.disabled = false;
      checkBtn.textContent = 'Check Availability';
    }

    // Step 2: Book a specific room
    async function bookRoom(roomName) {
      availableRoomsDiv.style.display = 'none';
      statusDiv.style.display = 'block';
      statusLog.innerHTML = '';
      checkBtn.disabled = true;

      const params = { ...getBookingParams(), room: roomName };
      addLog(`Booking ${roomName}...`, 'info');

      try {
        const res = await fetch('/api/book', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(params),
        });
        if (!res.ok) {
          const text = await res.text();
          let msg;
          try { msg = JSON.parse(text).error; } catch { msg = text; }
          addLog(`Server error (${res.status}): ${msg}`, 'error');
          availableRoomsDiv.style.display = 'block';
          checkBtn.disabled = false;
          return;
        }
        const data = await res.json();
        if (data.error) {
          addLog('Error: ' + data.error, 'error');
          availableRoomsDiv.style.display = 'block';
          checkBtn.disabled = false;
          return;
        }
        const { jobId } = data;

        const evtSource = new EventSource(`/api/status/${jobId}`);
        evtSource.onmessage = (e) => {
          const data = JSON.parse(e.data);
          if (data.status === 'progress') {
            addLog(data.message, 'info');
          } else if (data.status === 'done') {
            evtSource.close();
            if (data.success) {
              addLog(data.message, 'success');
            } else {
              addLog(data.message, 'error');
            }
            availableRoomsDiv.style.display = 'block';
            checkBtn.disabled = false;
          } else if (data.status === 'error') {
            evtSource.close();
            addLog('Error: ' + data.message, 'error');
            availableRoomsDiv.style.display = 'block';
            checkBtn.disabled = false;
          }
        };
        evtSource.onerror = () => {
          evtSource.close();
          addLog('Connection to server lost.', 'error');
          availableRoomsDiv.style.display = 'block';
          checkBtn.disabled = false;
        };
      } catch (err) {
        addLog('Request failed: ' + err.message, 'error');
        document.querySelectorAll('.room-list button').forEach(b => b.disabled = false);
      }
    }

    function showAvailableRooms(rooms) {
      availableRoomsDiv.style.display = 'block';
      roomList.innerHTML = '';

      // Separate standard vs larger rooms
      const standard = rooms.filter(r => !['P','Q','R','S','U'].includes(r.name.replace(' Study Room','').slice(-1)));
      const larger = rooms.filter(r => ['P','Q','R','S','U'].includes(r.name.replace(' Study Room','').slice(-1)));

      function addRoomItems(list, label) {
        if (list.length === 0) return;
        const header = document.createElement('li');
        header.style.cssText = 'font-weight:600; font-size:0.8rem; color:#666; border:none; padding:0.3rem 0;';
        header.textContent = label;
        roomList.appendChild(header);
        list.forEach(r => {
          const li = document.createElement('li');
          li.innerHTML = `
            <span>${r.name}</span>
            <button onclick="bookRoom('${r.name.replace(/'/g, "\\'")}')">Book</button>
          `;
          roomList.appendChild(li);
        });
      }

      addRoomItems(standard, 'Standard Rooms');
      addRoomItems(larger, 'Larger Rooms');
    }

    checkBtn.addEventListener('click', checkAvailability);

    // Reset availability when date/time changes
    ['date', 'startTime', 'endTime'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        availableRoomsDiv.style.display = 'none';
        roomList.innerHTML = '';
        statusDiv.style.display = 'none';
        statusLog.innerHTML = '';
      });
    });

    // Reservations tab
    const loadReservationsBtn = document.getElementById('loadReservationsBtn');
    const reservationsListDiv = document.getElementById('reservationsList');
    const reservationsStatus = document.getElementById('reservationsStatus');
    const reservationsLog = document.getElementById('reservationsLog');

    loadReservationsBtn.addEventListener('click', async () => {
      loadReservationsBtn.disabled = true;
      reservationsListDiv.innerHTML = '';
      reservationsStatus.style.display = 'block';
      reservationsLog.innerHTML = '<div class="msg info">Loading reservations... Approve Duo push if prompted.</div>';

      try {
        const res = await fetch('/api/reservations');
        const data = await res.json();

        if (data.error) {
          reservationsLog.innerHTML = `<div class="msg error">${data.error}</div>`;
          loadReservationsBtn.disabled = false;
          return;
        }

        reservationsStatus.style.display = false;

        if (!data.reservations || data.reservations.length === 0) {
          reservationsListDiv.innerHTML = '<p class="no-reservations">No upcoming reservations.</p>';
        } else {
          let html = `<table class="reservations-table">
            <thead><tr><th>Title</th><th>Start</th><th>End</th><th>Room</th></tr></thead><tbody>`;
          data.reservations.forEach(r => {
            html += `<tr>
              <td>${r.title}</td>
              <td>${r.startDate}</td>
              <td>${r.endDate}</td>
              <td>${r.room}</td>
            </tr>`;
          });
          html += '</tbody></table>';
          reservationsListDiv.innerHTML = html;
        }

        reservationsLog.innerHTML = '<div class="msg success">Reservations loaded.</div>';
      } catch (err) {
        reservationsLog.innerHTML = `<div class="msg error">Failed: ${err.message}</div>`;
      }

      loadReservationsBtn.disabled = false;
    });
  </script>
</body>
</html>
